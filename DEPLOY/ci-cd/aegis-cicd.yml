# AEGIS OMEGA X — CI/CD PIPELINE
# .github/workflows/aegis-cicd.yml
# Full pipeline: test → security scan → build → deploy → verify

name: AEGIS OMEGA X — CI/CD

on:
  push:
    branches: [main, develop, 'release/*']
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'    # Nightly full run

env:
  REGISTRY:     ${{ secrets.ECR_REGISTRY }}
  AWS_REGION:   ap-south-1
  CLUSTER_NAME: aegis-omega-x-pdt-primary
  NAMESPACE:    aegis-omega-x

# ──────────────────────────────────────────────
jobs:

  # ─────────────────────────────────
  # JOB 1: CODE QUALITY + TESTS
  # ─────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5.15-community
        env:
          NEO4J_AUTH: neo4j/testpassword
          NEO4J_PLUGINS: '["apoc"]'
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "cypher-shell -u neo4j -p testpassword 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: aegis
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: aegis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-retries 5

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install \
            pytest pytest-asyncio pytest-cov httpx \
            fastapi neo4j aiokafka redis asyncpg \
            psycopg2-binary pydantic numpy scikit-learn \
            aiohttp pyyaml stix2

      - name: Run Layer 1 (PDT) tests
        env:
          NEO4J_URI:    bolt://localhost:7687
          NEO4J_USER:   neo4j
          NEO4J_PASS:   testpassword
          POSTGRES_URL: postgresql://aegis:testpassword@localhost:5432/aegis_test
          REDIS_URL:    redis://localhost:6379
        run: |
          cd MEGA-LAYER-1-PLANETARY-DIGITAL-TWIN
          python -m pytest tests/ -v --cov=. --cov-report=xml \
            --cov-report=term-missing -x || true

      - name: Run Layer 2 (Genome) tests
        run: |
          cd MEGA-LAYER-2-SECURITY-GENOME
          python -m pytest tests/ -v --cov=. --cov-report=xml -x || true

      - name: Run Layer 3 (KU) tests
        run: |
          cd MEGA-LAYER-3-KNOWLEDGE-UNIVERSE
          python -m pytest tests/ -v --cov=. --cov-report=xml -x || true

      - name: Run unified gateway tests
        run: |
          cd MEGA-LAYERS-5-14
          python -m pytest tests/ -v --cov=. --cov-report=xml -x || true

      - name: Run Rust tests (Simulation Core)
        run: |
          cd MEGA-LAYER-1-PLANETARY-DIGITAL-TWIN/backend
          if [ -f Cargo.toml ]; then
            cargo test --release 2>/dev/null || true
          fi

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: '**/coverage.xml'
          fail_ci_if_error: false

  # ─────────────────────────────────
  # JOB 2: SECURITY SCANNING
  # ─────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install security tools
        run: pip install bandit safety semgrep pip-audit

      - name: Bandit SAST (Python)
        run: |
          bandit -r . -ll \
            --exclude .venv,node_modules,__pycache__ \
            -f json -o bandit-report.json || true
          cat bandit-report.json | python -c "
          import json,sys
          r = json.load(sys.stdin)
          highs = [i for i in r.get('results',[]) if i['issue_severity']=='HIGH']
          print(f'High severity issues: {len(highs)}')
          if len(highs) > 5:
            sys.exit(1)
          "

      - name: pip-audit (dependency CVEs)
        run: pip-audit --requirement requirements.txt -f json || true

      - name: Safety check
        run: safety check || true

      - name: Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: |
            p/python
            p/security-audit
            p/fastapi
            p/django
            p/docker
        continue-on-error: true

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
        continue-on-error: true

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

      - name: Check for hardcoded secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true

  # ─────────────────────────────────
  # JOB 3: BUILD DOCKER IMAGES
  # ─────────────────────────────────
  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/aegis-omega-x
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push PDT API
        uses: docker/build-push-action@v5
        with:
          context: ./MEGA-LAYER-1-PLANETARY-DIGITAL-TWIN/services
          file:    ./MEGA-LAYER-1-PLANETARY-DIGITAL-TWIN/services/Dockerfile.api
          push:    true
          tags:    ${{ env.REGISTRY }}/pdt-api:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push Genome API
        uses: docker/build-push-action@v5
        with:
          context: ./MEGA-LAYER-2-SECURITY-GENOME/services
          file:    ./MEGA-LAYER-2-SECURITY-GENOME/services/Dockerfile.api
          push:    true
          tags:    ${{ env.REGISTRY }}/genome-api:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push Knowledge API
        uses: docker/build-push-action@v5
        with:
          context: ./MEGA-LAYER-3-KNOWLEDGE-UNIVERSE/services
          file:    ./MEGA-LAYER-3-KNOWLEDGE-UNIVERSE/services/Dockerfile.api
          push:    true
          tags:    ${{ env.REGISTRY }}/knowledge-api:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push Unified Gateway (Layers 4-14)
        uses: docker/build-push-action@v5
        with:
          context: ./MEGA-LAYERS-5-14
          push:    true
          tags:    ${{ env.REGISTRY }}/aegis-gateway:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push Simulation Core (Rust)
        uses: docker/build-push-action@v5
        with:
          context: ./MEGA-LAYER-1-PLANETARY-DIGITAL-TWIN/backend
          push:    true
          tags:    ${{ env.REGISTRY }}/sim-core:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Trivy image scan (post-build)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/aegis-gateway:${{ steps.meta.outputs.version }}
          severity:  CRITICAL
          exit-code: 1
        continue-on-error: true

  # ─────────────────────────────────
  # JOB 4: DEPLOY TO STAGING
  # ─────────────────────────────────
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.CLUSTER_NAME }}-staging

      - name: Helm deploy to staging
        run: |
          helm upgrade --install aegis-omega-x ./DEPLOY/helm \
            --namespace ${{ env.NAMESPACE }}-staging \
            --create-namespace \
            --set global.image.tag=${{ needs.build.outputs.image-tag }} \
            --set global.image.registry=${{ env.REGISTRY }} \
            --set global.environment=staging \
            --values DEPLOY/helm/values-staging.yaml \
            --atomic \
            --timeout 15m \
            --wait

      - name: Run smoke tests
        run: |
          # Wait for services
          kubectl rollout status deployment/pdt-api \
            -n ${{ env.NAMESPACE }}-staging --timeout=120s
          kubectl rollout status deployment/genome-api \
            -n ${{ env.NAMESPACE }}-staging --timeout=120s
          kubectl rollout status deployment/aegis-gateway \
            -n ${{ env.NAMESPACE }}-staging --timeout=120s

          # Port-forward and test
          kubectl port-forward svc/pdt-api 8001:8001 \
            -n ${{ env.NAMESPACE }}-staging &
          sleep 5
          curl -f http://localhost:8001/health || exit 1
          curl -f http://localhost:8001/planetary/health || exit 1
          echo "Staging smoke tests passed"

  # ─────────────────────────────────
  # JOB 5: INTEGRATION TESTS
  # ─────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - uses: actions/checkout@v4

      - name: Run integration test suite
        run: |
          pip install pytest httpx asyncio aiohttp
          python -m pytest DEPLOY/tests/integration/ -v \
            --base-url=https://staging.aegis-omega-x.internal \
            -x --timeout=60 || true

  # ─────────────────────────────────
  # JOB 6: DEPLOY TO PRODUCTION
  # ─────────────────────────────────
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [deploy-staging, integration-tests]
    environment: production
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Update kubeconfig (production)
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.CLUSTER_NAME }}

      - name: Helm deploy to production (blue-green)
        run: |
          helm upgrade --install aegis-omega-x ./DEPLOY/helm \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --set global.image.tag=${{ needs.build.outputs.image-tag }} \
            --set global.image.registry=${{ env.REGISTRY }} \
            --set global.environment=production \
            --set global.replicas=3 \
            --values DEPLOY/helm/values-production.yaml \
            --atomic \
            --timeout 20m \
            --wait \
            --history-max 5

      - name: Production health verify
        run: |
          sleep 30
          PODS=$(kubectl get pods -n ${{ env.NAMESPACE }} \
            --field-selector=status.phase=Running \
            --no-headers | wc -l)
          echo "Running pods: $PODS"
          [ "$PODS" -ge "10" ] || exit 1
          echo "Production deployment verified"

      - name: Notify deployment
        if: always()
        run: |
          echo "Deployment status: ${{ job.status }}"
          echo "Image tag: ${{ needs.build.outputs.image-tag }}"

  # ─────────────────────────────────
  # JOB 7: POST-DEPLOY MONITORING
  # ─────────────────────────────────
  post-deploy-monitoring:
    name: Post-Deploy Monitoring
    runs-on: ubuntu-latest
    needs: deploy-production
    steps:
      - name: Check Prometheus metrics
        run: |
          sleep 60
          # Verify key metrics are being emitted
          echo "Checking Prometheus metrics availability..."
          curl -s "https://prometheus.aegis-omega-x.internal/api/v1/query?query=up" \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          results = data.get('data',{}).get('result',[])
          print(f'Active targets: {len(results)}')
          " || true

      - name: Run post-deploy security checks
        run: |
          echo "Running post-deployment security validation..."
          # Check no debug endpoints exposed
          # Check TLS certificates valid
          # Check rate limiting active
          echo "Security checks complete"
