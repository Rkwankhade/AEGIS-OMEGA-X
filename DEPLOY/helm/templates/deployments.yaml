      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8000"
    spec:
      serviceAccountName: aegis-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: aegis-gateway
          image: {{ .Values.global.image.registry }}/aegis-gateway:{{ .Values.global.image.tag }}
          ports:
