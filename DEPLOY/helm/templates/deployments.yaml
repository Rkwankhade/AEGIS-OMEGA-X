---
# ── AEGIS GATEWAY (Layers 4-14) DEPLOYMENT ────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-aegis-gateway
  namespace: {{ .Values.global.namespace }}
  labels:
    app: aegis-gateway
    system: aegis-omega-x
spec:
  replicas: {{ .Values.aegisGateway.replicas }}
  selector:
    matchLabels:
      app: aegis-gateway
  template:
    metadata:
      labels:
