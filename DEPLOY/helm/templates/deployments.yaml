# AEGIS OMEGA X — HELM TEMPLATES
# DEPLOY/helm/templates/deployments.yaml
# Complete production Kubernetes resources for all services

---
# ── PDT API DEPLOYMENT ─────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-pdt-api
  namespace: {{ .Values.global.namespace }}
  labels:
    app: pdt-api
    layer: "1"
    system: aegis-omega-x
    version: {{ .Values.global.image.tag | quote }}
spec:
  replicas: {{ .Values.pdtApi.replicas }}
  selector:
    matchLabels:
      app: pdt-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: pdt-api
        layer: "1"
        system: aegis-omega-x
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8001"
        prometheus.io/path:   "/metrics"
    spec:
      serviceAccountName: aegis-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: pdt-api
          image: {{ .Values.global.image.registry }}/pdt-api:{{ .Values.global.image.tag }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - containerPort: 8001
              name: http
          env:
            - name: NEO4J_URI
              value: bolt://{{ .Release.Name }}-neo4j:7687
            - name: NEO4J_USER
              valueFrom:
                secretKeyRef:
                  name: aegis-neo4j-secret
                  key: username
            - name: NEO4J_PASS
              valueFrom:
                secretKeyRef:
                  name: aegis-neo4j-secret
                  key: password
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: aegis-postgres-secret
                  key: url
            - name: REDIS_URL
              value: redis://{{ .Release.Name }}-redis:6379
            - name: KAFKA_BROKERS
              value: {{ .Release.Name }}-kafka:29092
            - name: ENVIRONMENT
              value: {{ .Values.global.environment }}
          resources:
            requests:
              memory: {{ .Values.pdtApi.resources.requests.memory }}
              cpu:    {{ .Values.pdtApi.resources.requests.cpu }}
            limits:
              memory: {{ .Values.pdtApi.resources.limits.memory }}
              cpu:    {{ .Values.pdtApi.resources.limits.cpu }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: pdt-api
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-pdt-api
  namespace: {{ .Values.global.namespace }}
  labels:
    app: pdt-api
    system: aegis-omega-x
spec:
  selector:
    app: pdt-api
  ports:
    - port: 8001
      targetPort: 8001
      name: http
  type: ClusterIP

---
